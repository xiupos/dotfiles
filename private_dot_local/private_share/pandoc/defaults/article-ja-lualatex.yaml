defaults:
  - article-ja

pdf-engine: lualatex

variables:
  documentclass: ltjsarticle
  classoption: [a4paper, 12pt]
  luatexjapresetoptions: [haranoaji, deluxe, no-math]
  mainfont: STIX Two Text
  mathfont: STIX Two Math
  header-includes: | #latex
    \usepackage{luatexja}
    \RequirePackage{luatex85}
