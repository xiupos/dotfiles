standalone: true

from: markdown+raw_tex
to: latex
pdf-engine: pdflatex

variables:
  lang: en-GB
  documentclass: article
  classoption: [a4paper, 12pt]
  geometry:
    - margin=20mm
    - footskip=10mm
    - hscale=0.76
    - hmarginratio=1:1
  graphics: true
  linkcolor: blue
  top-level-division: section
  indent: true

include-in-header:
  - ${.}/../includes/common.sty

number-sections: true
shift-heading-level-by: -1
listings: true
cite-method: natbib
filters:
  - pandoc-crossref
  - pandoc-unicode-math
  - include-files.lua
  - fenced-divs.lua
  - codeblock.lua
  - url-encode.lua
